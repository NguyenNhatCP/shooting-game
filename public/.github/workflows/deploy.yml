name: Deploy Node.js App

on:
  push:
    branches:
      - main # Hoặc bất kỳ branch nào bạn muốn deploy khi push

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '14'  # Cập nhật version Node.js nếu cần

      - name: Install dependencies
        run: |
          npm install

      - name: Build the app
        run: |
          npm run build  # Nếu bạn có script build

      - name: Deploy to your server
        run: |
          ssh -o StrictHostKeyChecking=no user@your-server-ip "cd /path/to/your/app && git pull && npm install && pm2 restart all"
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}