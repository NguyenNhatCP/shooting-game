<!DOCTYPE html>
<html>

<head>
  <title>Bắn Súng Sinh Tồn - Chọn Nhân Vật</title>
  <style>
    body {
      margin: 0;
      background: #1a1a1a;
      color: white;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    h2 {
      margin-top: 30px;
      letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
    }

    /* Lưới chứa các card nhân vật */
    .char-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 20px;
      width: 90%;
      max-width: 1000px;
      padding: 20px;
    }

    /* Style cho từng Card nhân vật */
    .char-card {
      background: linear-gradient(145deg, #222, #333);
      border: 2px solid #444;
      border-radius: 15px;
      padding: 10px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative;
    }

    .char-card:hover {
      transform: translateY(-10px);
      border-color: #00f0ff;
      box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
    }

    .char-card p {
      margin: 10px 0 5px;
      font-weight: bold;
      text-transform: uppercase;
      font-size: 14px;
    }

    /* Canvas chứa preview 3D */
    .preview3d {
      width: 100%;
      height: 150px;
      /* Tăng chiều cao để nhìn rõ model */
      display: block;
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.2);
    }

    #nameInput {
      margin-top: 20px;
      padding: 12px 20px;
      border-radius: 25px;
      border: none;
      width: 250px;
      outline: none;
    }

    /* Ẩn game lúc đầu */
    #gameContainer,
    #HUD,
    #leaderboard {
      display: none;
    }
  </style>
</head>

<body>
    <div id="profile" style="
    position: absolute; 
    top: 50px;           /* Cách mép trên 50px */
    right: 20px;         /* Cách mép phải 20px */
    background: rgba(0, 0, 0, 0.85); 
    color: white; 
    padding: 15px; 
    border: 2px solid gold; 
    border-radius: 8px; 
    z-index: 1000; 
    min-width: 180px; 
    text-align: center;
    display: none;       /* Mặc định ẩn */
    box-shadow: -5px 5px 15px rgba(0,0,0,0.5);
  ">
    <h2 id="profileName" style="margin: 0; font-size: 18px; color: gold;">Username</h2>
    <hr style="border: 0; border-top: 1px solid #444;">
    <div style="text-align: left; font-size: 14px;">
        <p>🥷 Nhân vật: <span id="profileType" style="color: cyan; float: right;">-</span></p>
        <p>🏆 Hạng: <span id="profileRank" style="color: gold; float: right;">-</span></p>
        <p>📊 Điểm số: <span id="profileScore" style="float: right;">0</span></p>
    </div>
    <div style="clear: both;"></div>
    <button onclick="closeProfile()" style="
        margin-top: 10px; 
        cursor: pointer; 
        padding: 5px 15px; 
        background: #ff4444; 
        color: white; 
        border: none; 
        border-radius: 4px;
        width: 100%;
    ">
        Đóng (Esc)
    </button>
  </div>
  <div id="menu">
    <h2>CHỌN NHÂN VẬT</h2>

    <div class="char-grid" id="charGrid">
      <div class="char-card" onclick="select('soldier')">
        <canvas class="preview3d"></canvas>
        <p>Soldier</p>
      </div>
      <div class="char-card" onclick="select('tank')">
        <canvas class="preview3d"></canvas>
        <p>Tank</p>
      </div>
      <div class="char-card" onclick="select('assassin')">
        <canvas class="preview3d"></canvas>
        <p>Assassin</p>
      </div>
      <div class="char-card" onclick="select('bomber')">
        <canvas class="preview3d"></canvas>
        <p>Bomber</p>
      </div>
      <div class="char-card" onclick="select('ghost')">
        <canvas class="preview3d"></canvas>
        <p>Ghost</p>
      </div>
      <div class="char-card" onclick="select('hung')">
        <canvas class="preview3d"></canvas>
        <p>Mr. Hung</p>
      </div>
      <div class="char-card" onclick="select('beauty')">
        <canvas class="preview3d"></canvas>
        <p>Beauty</p>
      </div>
      <div class="char-card" onclick="select('spider')">
        <canvas class="preview3d"></canvas>
        <p>Spider Man</p>
      </div>
    </div>

    <input id="nameInput" placeholder="Nhập tên chiến binh..." />
  </div>
  <div id="gameContainer" style="position: relative; width: 800px; height: 600px;"> <canvas id="gameCanvas" width="800"
      height="600"></canvas> </div> <!-- 🏆 LEADERBOARD -->
  <div id="leaderboard"
    style=" position:absolute; top:10px; right:10px; background:rgba(0,0,0,0.6); color:white; padding:10px; font-size:12px; border-radius:8px; min-width:150px; pointer-events:none; ">
    <b>🏆 TOP</b>
    <div id="lbList"></div>
  </div> <!-- HUD dưới gameplay -->
  <div id="HUD"
    style="width:800px; height:60px; background:rgba(0,0,0,0.6); color:white; display:flex; justify-content:space-around; align-items:center; font-family:Arial; margin-top:5px;">
    <div id="HPBarContainer"> <span>HP</span>
      <div id="HPBar" style="width:120px; height:12px; background:red; border-radius:4px;"></div>
    </div>
    <div id="ManaBarContainer"> <span>MANA</span>
      <div id="ManaBar" style="width:120px; height:12px; background:cyan; border-radius:4px;"></div>
    </div>
    <div id="WeaponInfo">🔫 PISTOL</div> <!-- 🏆 RANK -->
    <div id="RankInfo">🏆 Wood (0)</div>
    <div id="chatBox"> 
      <div id="messages">
    </div> 
    <input id="chatInput" placeholder="Nhập tin nhắn..." /> 
    </div>
  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="./js/draw.js"></script>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.161.0/build/three.module.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from "three";
    import { GLTFLoader } from "https://unpkg.com/three@0.161.0/examples/jsm/loaders/GLTFLoader.js";

    const loader = new GLTFLoader();

    // Hàm tạo preview cho từng canvas
    function createPreview(canvas, path) {
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(45, canvas.clientWidth / canvas.clientHeight, 0.1, 100);

      // Đặt camera hơi cao lên và nhìn xuống
      camera.position.set(0, 0.2, 3);

      const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
      renderer.setSize(canvas.clientWidth, canvas.clientHeight, false);

      scene.add(new THREE.AmbientLight(0xffffff, 2));

      loader.load(path, (gltf) => {
        const model = gltf.scene;
        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());

        // Căn giữa X, Z và hạ thấp Y một chút
        model.position.set(-center.x, -center.y - 0.2, -center.z);

        const maxDim = Math.max(size.x, size.y, size.z);
        model.scale.setScalar(1.6 / maxDim);

        scene.add(model);

        // Chạy animation bên trong để đảm bảo có model mới quay
        const animate = () => {
          requestAnimationFrame(animate);
          model.rotation.y += 0.01;
          renderer.render(scene, camera);
        };
        animate();
      });
    }

    // Danh sách model khớp với số lượng card
    const models = [
      "/models/soldier.glb",
      "/models/tank.glb",
      "/models/assassin.glb",
      "/models/bomber.glb",
      "/models/ghost.glb",
      "/models/hung.glb",
      "/models/beauty.glb",
      "/models/spider.glb"
    ];

    // Khởi tạo toàn bộ preview
    const cards = document.querySelectorAll(".char-card");
    cards.forEach((card, i) => {
      const canvas = card.querySelector(".preview3d");
      if (models[i]) {
        createPreview(canvas, models[i]);
      }
    });

  </script>
</body>

</html>
